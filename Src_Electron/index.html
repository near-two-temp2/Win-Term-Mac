<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" />
  <title>WinTermMac - Electron 基线</title>

  <!-- xterm.js 样式(来自本地 node_modules) -->
  <link rel="stylesheet" href="node_modules/xterm/css/xterm.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #1e1e1e;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    /* #pane-root 承载整棵窗格树;叶子容器由 PaneCore(pane.js)自行创建 */
    #pane-root {
      position: absolute;
      inset: 0;
    }
  </style>
</head>
<body>
  <!-- 窗格树的挂载根节点(PaneManager 会在此建立布局与各叶子终端) -->
  <div id="pane-root"></div>

  <!-- xterm.js 及插件(UMD 构建,挂载到 window:Terminal / FitAddon / WebglAddon) -->
  <script src="node_modules/xterm/lib/xterm.js"></script>
  <script src="node_modules/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
  <script src="node_modules/xterm-addon-webgl/lib/xterm-addon-webgl.js"></script>

  <!-- 窗格模块(按依赖顺序:核心树 → 键位 → 命令面板 → 叶子终端 → 胶水控制器) -->
  <script src="renderer/pane.js"></script>
  <script src="renderer/keymap.js"></script>
  <script src="renderer/palette.js"></script>
  <script src="renderer/terminal.js"></script>
  <script src="renderer/panes.js"></script>

  <!-- 渲染进程入口:一句 PaneManager.create 装配整套视图 -->
  <script src="renderer/index.js"></script>
</body>
</html>
