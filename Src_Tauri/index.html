<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Win-Term-Mac · Tauri</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1e1e1e;
        overflow: hidden;
      }
      /* 窗格根容器:窗格二叉树(pane.js layout)递归渲染到这里。
         controller.js 每次结构变化都会重排其内部 DOM。 */
      #root {
        width: 100vw;
        height: 100vh;
      }
      /* 当前聚焦窗格的可见高亮(pane.js 生成的叶子容器带 .pane-leaf)。 */
      .pane-leaf {
        box-sizing: border-box;
        border: 1px solid transparent;
      }
      .pane-leaf:focus-within {
        border-color: #0a84ff;
      }
    </style>
  </head>
  <body>
    <!-- 窗格树根容器;首绘由 main.js 的 mountController 接管(建树 + 起真实 PTY) -->
    <div id="root"></div>
    <!-- 模块入口:装配 term/pane/palette/keymap/controller -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
